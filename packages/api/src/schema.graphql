#graphql

type Query {
  moodNoteOne(id: ID!): MoodNote!
  moodNoteMany(input: Page!): MoodNotePage!

  testOne(id: ID!): Test!

  userOne(id: ID!): User!
}

type Mutation {
  moodNoteCreate(input: MoodNoteCreate!): MoodNote!
  moodNoteUpdate(input: MoodNoteUpdate!, id: ID!): MoodNote!
  moodNoteDelete(id: ID!): MoodNote!

  userCreate(input: UserCreate!): User!
  userUpdate(input: UserUpdate!): User!
  userDelete(id: ID!): User!

  testCreate(input: TestCreate!): Test!
}

# Mood Note section

input Page {
  skip: Int!
  take: Int!
}

type MoodNotePage {
  total: Int!
  items: [MoodNote!]!
}

type MoodNote {
  id: ID!
  title: String
  emotion: Emotion!
  intencity: Int!
  tags: [MoodNoteTag!]!
  description: String
  activity: Activity
}

type Activity {
  id: ID!
  name: String!
  description: String
}

type MoodNoteTag {
  name: String!
  category: MoodCategory!
}

enum Emotion {
  happy
  sad
  angry
  anxious
  calm
  tired
  lonely
  stressed
  grateful
}

input MoodNoteCreate {
  title: String!
  emotion: Emotion!
  description: String
  intencity: Int!
  tags: [MoodNoteTagCreate!]!
  activityId: ID
}

input MoodNoteTagCreate {
  name: String!
  category: MoodCategory!
}

enum MoodCategory {
  school
  work
  money
  health
  relationships
}

input MoodNoteUpdate {
  title: String
  emotion: Emotion
  intencity: Int!
}

# Test Section

type Test {
  id: ID!
  type: TestType!
  score: Int!
  createdAt: String!
  answers: [TestAnswer!]!
}

type TestAnswer {
  id: ID!
  questionTitle: String!
  questionNumber: Int!
  score: Int!
}

input TestCreate {
  userId: ID!
  type: TestType!
  answers: [TestAnswerInput!]!
}

input TestAnswerInput {
  questionNumber: Int!
  score: Int!
}

enum TestType {
  PHQ9
  GAD7
}

# User Section

type User {
  id: ID!
  name: String!
  email: String!
  gender: Gender!
  birthDate: String
}

enum Gender {
  male
  female
  unknown
}

input UserCreate {
  name: String!
  email: String!
  password: String!
  gender: Gender!
  birthDate: String
}

input UserUpdate {
  id: ID!
  name: String
  # Add email confirmation in the future before changing it
  email: String
  password: String
  gender: Gender
  birthDate: String
}
